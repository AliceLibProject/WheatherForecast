<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('images/site_bg21.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .block.top-block .header
        {
            display: flex;
            margin-bottom: 40px;
        }
        .block.top-block .header .first
        {
            flex: auto;
        }

        .block {
            text-align: center;
            margin: 20px;
            width: 80%;
            border-radius: 12px;
        }

        .top-block {
			background: linear-gradient(
				to top,				
				rgba(255, 255, 255, 0.3) 85%,
				rgba(255, 255, 255, 0.1) 15%
			  );
			backdrop-filter: blur(3px); /* Эффект размытия */
			-webkit-backdrop-filter: blur(10px); /* Для поддержки Safari (может потребоваться префикс) */
            color: white;
            position: relative;
            padding: 20px;
            text-align: left;
        }

        .top-img{
            position: absolute;
            top:40%;
            left: 80%;
            width: -webkit-fill-available;
        }

        .middle-row{
            justify-content: space-around;
            display: flex;
        }

        .middle-block {
            background-color: #d3d3d3; /* Светло-серый */
            padding: 20px;
            font-weight: 500;
            gap: 10px; /* Промежуток между блоками */
        }
        .middle-block-header {
            margin-bottom: 20px;
            text-align: left;
            margin-left: 25px;
        }

        .middle-item {
            width: 30%;
            background-color: #e0e0e0; /* Чуть светлее цвета родителя */
            padding: 10px;
            color: #333; /* Темно-серый цвет текста */
            border-radius: 5px; /* Закругленные углы для элементов */
            text-align: left; /* Центрировать текст внутри элементов */
        }

        .bottom-block {
            background-color: #f0f0f0; /* Светло-серый цвет */
            padding: 20px;
            border: 1px solid darkgray;
            border-collapse: collapse;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: x-small;
        }

        .table-header{
            font-size: large;
        }

        .table.table-bordered {
            border-bottom: 2px solid lightslategray
            }

        th, td {            
            text-align: center;
            border-style: inherit;
        }
        tr{
            border-bottom: 1px solid darkgray;
        }
    </style>
</head>
<body id="root">
</body>
</html>
